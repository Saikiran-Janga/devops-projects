apiVersion: apps/v1
kind: Deployment

metadata:
  name: website-resources

spec:
  replicas: 2

  selector:
    matchLabels:
      app: website-resources

  template:
    metadata:
      labels:
        app: website-resources

    spec:
      containers:
      - name: website
        image: saikiran1605/devops-website:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"
