apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx

        envFrom:
        - configMapRef:
            name: app-config

        envFrom:
        - secretRef:
            name: app-secret

        ports:
          - containerPort: 80
